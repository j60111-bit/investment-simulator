                  <div>근속연수 공제 후 환산급여 산출 → 소득세 누진세율(6~45%) 적용</div>
                  <div>분류과세 (종합소득세에 합산 안 됨) + 지방소득세 10% 포함</div>
                  {row.retirePayoutTax > 0 && row.retirePayout > 0 && (
                    <div className="rounded px-2 py-1 text-xs" style={{ background:'rgba(220,234,255,0.70)', color:'#3d5580' }}>
                      추정 실효세율: 약 {((row.retirePayoutTax / (row.retirePayout + row.retirePayoutTax)) * 100).toFixed(1)}%
                      (세전 {fmtN(row.retirePayout + row.retirePayoutTax)}원 → 세후 {fmtN(row.retirePayout)}원)
                    </div>
                  )}
                  <div className="flex justify-between font-semibold border-t pt-1" style={{ borderColor:'rgba(90,130,200,0.18)', color:'#2c4068' }}><span>퇴직소득세 (지방세 포함)</span><span>{fmtN(row.retirePayoutTax)}원</span></div>
                </div>
              </div>
            )}

          </div>
        )}
      </div>
    );
  };

  const ib = row.incBreakdown  || {};
  const eb = row.expBreakdown  || {};
  const tb = row.taxBreakdown  || {};
  const td = row.taxDetail     || null;

  const isRetired = row.age >= retirementAge;

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center"
      style={{ background:'rgba(0,0,0,0.6)', backdropFilter:'blur(4px)' }}
      onClick={onClose}>
      <div className="w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-t-2xl md:rounded-2xl shadow-2xl"
        style={{ background:'rgba(245,249,255,0.98)', border:'1px solid rgba(90,130,200,0.22)', backdropFilter:'blur(20px)' }}
        onClick={e => e.stopPropagation()}>
        {/* 헤더 */}
        <div className="sticky top-0 px-5 py-4 flex items-center justify-between rounded-t-2xl"
          style={{ background:'rgba(238,244,255,0.99)', borderBottom:'1px solid rgba(90,130,200,0.16)' }}>
          <div>
            <span className="text-base font-bold" style={{ color:'#1a2744' }}>{row.age}세 상세 내역</span>
            {isRetired && <span className="ml-2 text-xs px-2 py-0.5 rounded-full font-semibold" style={{ background:'rgba(37,99,235,0.14)', color:'#1e40af' }}>은퇴 후</span>}
            {row.isRecession  && <span className="ml-2 text-xs px-2 py-0.5 rounded-full font-semibold" style={{ background:'rgba(180,83,9,0.12)', color:'#92400e' }}>경기침체</span>}
            {row.isDepression && <span className="ml-2 text-xs px-2 py-0.5 rounded-full font-semibold" style={{ background:'rgba(185,28,28,0.12)', color:'#991b1b' }}>대공황</span>}
            {row.events?.length > 0 && row.events.map((e,i) => (
              <span key={i} className="ml-1 text-xs px-2 py-0.5 rounded-full font-semibold" style={{ background:'rgba(109,40,217,0.12)', color:'#5b21b6' }}>{e}</span>
            ))}
          </div>
          <button onClick={onClose} className="text-xl font-bold leading-none" style={{ color:'#5575a0' }}>×</button>
        </div>

        <div className="px-5 py-4">
          {/* 현금흐름 요약 */}
          <div className="grid grid-cols-3 gap-2 mb-5">
            {[
              { label: '총 소득', val: row.income, color: 'text-blue-600' },
              { label: '총 지출+세금', val: row.expense + row.tax, color: 'text-red-500' },
              { label: row.cf >= 0 ? '순 저축' : '자산 인출', val: row.cf, color: row.cf >= 0 ? 'text-green-600' : 'text-red-600' },
            ].map(c => (
              <div key={c.label} className="rounded-xl p-3 text-center"
                style={{ background:'rgba(255,255,255,0.85)', border:'1px solid rgba(90,130,200,0.18)' }}>
                <div className="text-xs mb-1" style={{ color:'#5575a0' }}>{c.label}</div>
                <div className={`text-sm font-bold ${c.color}`}>{fmt(c.val)}</div>
              </div>
            ))}
          </div>

          {/* 퇴직연금 수령 배너 (은퇴 연도에만 표시) */}
          {(row.retirePayout > 0) && (
            <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 mb-4">
              <div className="text-xs font-bold text-purple-700 mb-1">🎉 퇴직연금 수령 (이 연도)</div>
              <div className="flex justify-between text-xs">
                <span className="text-gray-500">세전 수령액</span>
                <span className="font-medium">{fmt(row.retirePayout + row.retirePayoutTax)}</span>
              </div>
              <div className="flex justify-between text-xs">
                <span className="text-gray-500">퇴직소득세</span>
                <span className="font-medium text-red-500">-{fmt(row.retirePayoutTax)}</span>
              </div>
              <div className="flex justify-between text-xs font-bold border-t border-purple-200 pt-1 mt-1">
                <span className="text-purple-700">세후 현금 수령</span>
                <span className="text-purple-700">{fmt(row.retirePayout)}</span>
              </div>
            </div>
          )}

          {/* A. 소득 내역 */}
          <Section title="소득 내역" color="text-blue-400"
            total={row.income}
            items={[
              { label: '근로소득',               value: ib.earned      || 0 },
              { label: '배우자 소득',             value: ib.spouse      || 0 },
              { label: '자산 수익 (포트폴리오)',   value: ib.assetYield  || 0 },
              { label: '금융소득 (외부)',          value: ib.extFin      || 0 },
              { label: '국민연금',                value: ib.pubPension  || 0 },
              { label: '사적연금 (IRP/연금저축)', value: ib.privPension || 0 },
              { label: '기타소득',                value: ib.other       || 0 },
            ]}
          />

          {/* B. 지출 내역 */}
          <Section title="지출 내역" color="text-red-400"
            total={row.expense}
            items={[
              { label: isRetired && inp?.retirementExpenseEnabled ? '생활비 (은퇴 후 직접 설정, 물가 반영)' : '생활비 (물가 반영)', value: eb.living  || 0 },
              { label: '주거비 (물가 반영)', value: eb.housing || 0 },
              { label: '기타 고정지출 (물가 반영)', value: eb.extra || 0 },
              { label: '결혼 비용',       value: eb.marriage      || 0, color: 'text-purple-600' },
              { label: '결혼 후 추가 지출 (물가 반영)', value: eb.marriageExtra || 0, color: 'text-purple-500' },
              { label: '양육비 (물가 반영)', value: eb.childcare   || 0 },
              { label: '대학 교육비 (물가 반영)', value: eb.education     || 0 },
              { label: '부모 부양비 (물가 반영)', value: eb.parentSupport || 0 },
            ]}
          />

          {/* C. 세금·보험료 */}
          <Section title="세금 · 사회보험료" color="text-slate-400"
            total={row.tax + (tb.retirePayoutTax || 0)}
            items={[
              { label: isRetired ? `건강보험료 (지역가입자${row.age - retirementAge <= 2 ? ' 임의계속' : ''})` : '4대보험료 (국민연금+건강+장기요양+고용)',
                value: tb.social || 0 },
              { label: '근로소득세',                                       value: tb.incomeTax  || 0 },
              { label: '지방소득세',                                       value: tb.local      || 0 },
              { label: '금융소득세 (원천징수/종합과세)',                     value: tb.financial  || 0 },
              { label: `사적연금 수령세 (${row.privPen_ > 15e6 ? '16.5%' : row.age >= 80 ? '3.3%' : row.age >= 70 ? '4.4%' : '5.5%'})`,
                value: tb.privPenTax || 0 },
              { label: '부동산 보유세 (재산세+종부세)',                     value: tb.propertyTax || 0 },
              { label: '퇴직소득세 (근속연수 공제 후 분류과세 + 지방세)',   value: tb.retirePayoutTax || 0 },
            ]}
          />
          <TaxDetailSection tb={tb} td={td} age={row.age} retirementAge={retirementAge} />

          {/* D. 자산 현황 */}
          <div className="mb-4">
            <div className="text-xs font-bold mb-2 pb-1 border-b" style={{ color:'#1a2744', borderColor:'rgba(90,130,200,0.18)' }}>자산 현황 (연말 기준)</div>
            <div className="space-y-1.5">
              {[
                { label: '예금/현금',    val: row.cash,    color: '#93c5fd' },
                { label: '국내주식',     val: row.dom,     color: '#86efac' },
                { label: '해외주식',     val: row.ovs,     color: '#fde68a' },
                { label: '채권/펀드',    val: row.bonds,   color: '#2dd4bf' },
                { label: '연금계좌',     val: row.pension, color: '#c4b5fd' },
                { label: '부동산',       val: row.re,      color: '#2c4068' },
              ].map(a => (
                <div key={a.label} className="flex items-center justify-between text-xs">
                  <div className="flex items-center gap-1.5">
                    <span style={{ width: 8, height: 8, borderRadius: 2, background: a.color, display: 'inline-block' }} />
                    <span className="text-gray-500">{a.label}</span>
                  </div>
                  <span className="font-medium text-gray-800">{fmt(a.val)}</span>
                </div>
              ))}
            </div>
            <div className="flex justify-between text-xs font-bold mt-2 pt-1.5 border-t" style={{ borderColor:'rgba(90,130,200,0.18)', color:'#1a2744' }}>
              <span>총자산</span>
              <span>{fmt(row.totalNet)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// PAGE 5 — 결과
// ─────────────────────────────────────────────
function ResultPage({ inp, scenario, onBack, onPrev }) {
  const result = useMemo(() => runSimulation(inp, scenario), [inp, scenario]);
  const { rows, depletionAge, retirementAssets, monthlyBudget, insights } = result;
  const [tableOpen, setTableOpen] = useState(false);
  const [interval,  setTblInt]    = useState(5);
  const [detailRow,  setDetailRow] = useState(null);

  const summCards = [
    { label: '은퇴 시 총자산',    val: fmt(retirementAssets),                                           ok: retirementAssets > 0 },
    { label: '자산 고갈 시점',    val: depletionAge ? `${depletionAge}세` : '고갈 없음',                ok: !depletionAge },
    { label: '은퇴 후 월 가용액', val: fmt(monthlyBudget),                                              ok: monthlyBudget > 500000 },
    { label: '시나리오',          val: SC_INFO[scenario]?.label || scenario,                            ok: scenario === 'BASELINE' },
  ];

  const tableRows = rows.filter(r =>
    r.age % interval === 0 ||
    r.age === inp.age ||
    r.age === inp.lifeExpectancy ||
    r.age === inp.retirementAge
  );

  return (
    <div className="max-w-2xl mx-auto space-y-5">

      {/* Summary cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {summCards.map(c => (
          <Card key={c.label} className="p-4 text-center">
            <div className="text-xs mb-1" style={{ color:'#4e6a92' }}>{c.label}</div>
            <div className="text-base font-bold" style={{ color: c.ok ? '#60a5fa' : '#f87171' }}>{c.val}</div>
          </Card>
        ))}
      </div>

      {/* Asset chart */}
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-sm font-bold" style={{ color:'#2c4068' }}>자산 추이</h3>
          <span className="text-xs" style={{ color:'#4e6a92' }}>※ 국민연금 수령액 미포함</span>
        </div>
        <AssetChart rows={rows} retireAge={inp.retirementAge} depletionAge={depletionAge} />
      </Card>

      {/* Income/Expense chart */}
      <Card className="p-5">
        <h3 className="text-sm font-bold mb-3" style={{ color:'#2c4068' }}>소득 vs 지출</h3>
        <IncomeExpenseChart rows={rows} retireAge={inp.retirementAge} />
      </Card>

      {/* Insights */}
      <Card className="p-5">
        <h3 className="text-sm font-bold mb-3" style={{ color:'#2c4068' }}>📌 핵심 인사이트</h3>
        <ul className="space-y-2">
          {insights.map((ins, i) => (
            <li key={i} className="flex gap-2 text-sm" style={{ color:'#4e6a92' }}>
              <span className="text-blue-400 flex-shrink-0 mt-0.5">▸</span>
              <span>{ins}</span>
            </li>
          ))}
        </ul>
      </Card>

      {/* Detail table */}
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <button onClick={() => setTableOpen(!tableOpen)} className="text-sm font-bold text-gray-700 flex items-center gap-2">
            연도별 상세 데이터 <span className="text-gray-400 text-xs">{tableOpen ? '▲' : '▼'}</span>
          </button>
          {tableOpen && (
            <div className="flex gap-1.5">
              {[1, 5, 10].map(n => (
                <button key={n} onClick={() => setTblInt(n)}
                  className="px-2.5 py-1 text-xs rounded-full transition"
                  style={interval === n
                    ? { background:'linear-gradient(135deg,#3b82f6,#7c3aed)', color:'#fff', border:'1px solid transparent' }
                    : { background:'rgba(255,255,255,0.80)', color:'#3d5580', border:'1px solid rgba(90,130,200,0.22)' }}>
                  {n === 1 ? '매년' : `${n}년`}
                </button>
              ))}
            </div>
          )}
        </div>
        {tableOpen && (
          <>
            <p className="text-xs text-gray-400 mb-2">나이를 클릭하면 해당 연도 상세 내역을 볼 수 있습니다.</p>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr style={{ borderBottom:'1px solid rgba(90,130,200,0.16)' }}>
                    {['나이', '소득', '지출', '세금', '순저축', '총자산'].map(h => (
                      <th key={h} className="py-2 px-1.5 text-right font-semibold first:text-left"
                        style={{ color:'#4e6a92' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {tableRows.map(r => {
                    const isRet = r.age === inp.retirementAge;
                    const isDep = r.age === depletionAge;
                    const isRec = r.isRecession;
                    const isCra = r.isDepression;
                    const rowBg = isRet ? 'rgba(59,130,246,0.09)' : isDep || isCra ? 'rgba(239,68,68,0.08)' : isRec ? 'rgba(245,158,11,0.08)' : 'transparent';
                    return (
                      <tr key={r.age}
                        onClick={() => setDetailRow(r)}
                        className="cursor-pointer transition"
                        style={{ borderBottom:'1px solid rgba(90,130,200,0.12)', background: rowBg }}
                        onMouseEnter={e => e.currentTarget.style.background='rgba(59,130,246,0.10)'}
                        onMouseLeave={e => e.currentTarget.style.background=rowBg}>
                        <td className="py-2 px-1.5 font-medium" style={{ color:'#2c4068' }}>
                          <span className="underline underline-offset-2 cursor-pointer" style={{ color:'#2563eb' }}>{r.age}세</span>
                          {isRet && <span className="ml-1 text-xs" style={{ color:'#2563eb' }}>은퇴</span>}
                          {isDep && <span className="ml-1 text-xs text-red-400">고갈</span>}
                          {isCra && <span className="ml-1 text-xs text-red-400">대공황</span>}
                          {isRec && <span className="ml-1 text-xs text-amber-400">침체</span>}
                          {r.events?.length > 0 && <span className="ml-1 text-xs" style={{ color:'#c4b5fd' }}>★</span>}
                        </td>
                        <td className="py-2 px-1.5 text-right" style={{ color:'#93c5fd' }}>{fmt(r.income)}</td>
                        <td className="py-2 px-1.5 text-right text-red-400">{fmt(r.expense)}</td>
                        <td className="py-2 px-1.5 text-right" style={{ color:'#4e6a92' }}>{fmt(r.tax + (r.retirePayoutTax || 0))}</td>
                        {(() => { const cf = r.cf - (r.retirePayoutTax || 0); return (
                        <td className={`py-2 px-1.5 text-right font-medium ${cf >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{fmt(cf)}</td>
                        ); })()}
                        <td className="py-2 px-1.5 text-right font-bold" style={{ color:'#1a2744' }}>{fmt(r.totalNet)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <p className="text-xs text-gray-400 mt-3 text-right">※ 국민연금 수령액은 자산에 포함되지 않습니다.</p>
          </>
        )}
      </Card>

      {/* 상세 패널 */}
      {detailRow && <DetailPanel row={detailRow} inp={inp} onClose={() => setDetailRow(null)} retirementAge={inp.retirementAge} />}

      <div className="flex gap-3">
        <button onClick={onPrev}
          className="flex-1 py-3 rounded-xl font-medium text-sm transition"
          style={{ border:'1px solid rgba(90,130,200,0.22)', color:'#3d5580', background:'rgba(255,255,255,0.75)' }}>
          ← 시나리오 변경
        </button>
        <button onClick={onBack}
          className="flex-1 py-3 rounded-xl font-medium text-sm transition"
          style={{ border:'1px solid rgba(90,130,200,0.22)', color:'#3d5580', background:'rgba(255,255,255,0.75)' }}>
          ↩ 처음으로
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────
function App() {
  const [page,     setPage]     = useState(0);
  const [inp,      setInp]      = useState(PRESETS.MID);
  const [scenario, setScenario] = useState('BASELINE');

  const goTo = (n) => { window.scrollTo({ top: 0, behavior: 'instant' }); setPage(n); };

  return (
    <div className="min-h-screen py-8 px-4">
      <div className="max-w-2xl mx-auto">
        <Steps cur={page} onStep={goTo} />
        {page === 0 && <PresetPage   inp={inp} setInp={setInp} onNext={() => goTo(1)} />}
        {page === 1 && <InfoPage     inp={inp} setInp={setInp} onPrev={() => goTo(0)} onNext={() => goTo(2)} />}
        {page === 2 && <InvestPage   inp={inp} setInp={setInp} onPrev={() => goTo(1)} onNext={() => goTo(3)} />}
        {page === 3 && <ScenarioPage scenario={scenario} setScenario={setScenario} inp={inp} setInp={setInp} onPrev={() => goTo(2)} onNext={() => goTo(4)} />}
        {page === 4 && <ResultPage   inp={inp} scenario={scenario} onBack={() => goTo(0)} onPrev={() => goTo(3)} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
